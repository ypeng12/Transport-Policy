# ============================================================
# 航空货运网络分析 — 全局配置文件
# ============================================================

# --- 数据路径 ---
data:
  raw_path: "data/raw/flights.csv"
  metadata_path: "data/raw/airports.csv" # 新增机场元数据路径
  processed_dir: "data/processed"

# --- 节点分类与样式 ---
classification:
  # 分类权重: Score = 0.7 * Norm(Degree) + 0.3 * Norm(DomiRank)
  major_hub_threshold: 0.6
  regional_hub_threshold: 0.2
  colors:
    major_hub: "#10B981"    # Emerald 500 (匹配 AircargoNet)
    regional_hub: "#6366F1" # Indigo 500
    feeder: "#94A3B8"      # Slate 400

# --- 图构建参数 ---
graph:
  # 权重字段: 用 flights × payload_tonnes 作为边权重
  weight_col: "weight"

# --- PageRank 参数 ---
pagerank:
  alpha: 0.85          # 阻尼因子 (damping factor)
  max_iter: 100
  tol: 1.0e-06

# --- DomiRank 参数 ---
domirank:
  sigma: -0.5          # 耦合强度 σ, 需满足 |σ| < 1/ρ(A)
  theta: 1.0           # θ 参数
  beta: 1.0            # 衰减率 β
  max_iter: 500
  tol: 1.0e-06

# --- 鲁棒性模拟 ---
robustness:
  strategies:
    - degree
    - betweenness
    - pagerank
    - domirank
    - random
  random_runs: 10       # 随机攻击重复次数

# --- 可视化 ---
visualization:
  top_n: 15             # 柱状图展示前 N 个机场
  figure_dpi: 150
  save_plots: true
  show_plots: true
